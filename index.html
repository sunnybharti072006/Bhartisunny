    <style>
        :root {
            --bg: #0f0f0f;
            --fg: #d4d4d4;
            --fg-dim: #6b6b6b;
            --border: #1e1e1e;
            --green: #4ec994;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
        }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            min-height: 100vh;
            padding: 2rem 1.5rem;
            position: relative;
        }

        /* ── TOP NAV ── */
        nav {
            position: absolute;
            top: 1.5rem;
            left: 0;
            right: 0;
        }

        nav ul {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 0.3rem 1.4rem;
        }

        nav a {
            font-size: 13px;
            color: var(--fg-dim);
            text-decoration: none;
        }

        nav a:hover {
            color: var(--fg);
            text-decoration: underline;
        }

        .nav-brand {
            color: var(--fg);
            text-decoration: none;
        }

        .nav-brand:hover {
            color: var(--green);
        }

        .nav-brand .prefix {
            color: var(--green);
        }

        .nav-brand .cursor {
            display: inline-block;
            width: 7px;
            height: 14px;
            background: #e74c3c;
            margin-left: 1px;
            vertical-align: text-bottom;
            animation: cursor-blink 1s step-end infinite;
        }

        @keyframes cursor-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* ── CENTER CONTENT ── */
        .center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding-bottom: 6rem;
        }

        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--fg-dim);
            margin-bottom: 1.25rem;
        }

        h1 {
            font-size: 22px;
            font-weight: bold;
            color: var(--fg);
            margin-bottom: 0.4rem;
            text-align: center;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .tag {
            font-size: 15px;
            color: var(--fg-dim);
            font-weight: normal;
        }

        .blink-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            display: inline-block;
            animation: blink 1.2s step-start infinite;
            flex-shrink: 0;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        .tagline {
            font-size: 13px;
            color: var(--fg-dim);
            text-align: center;
        }

        /* ── BOTTOM SECTION ── */
        .bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            padding-bottom: 1.5rem;
        }

        /* social icons */
        .social-row {
            display: flex;
            gap: 1.6rem;
            align-items: center;
        }

        .social-row a {
            color: var(--fg-dim);
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: color 0.15s;
        }

        .social-row a:hover {
            color: var(--fg);
        }

        .social-row svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* footer text */
        footer {
            font-size: 12px;
            color: #3a3a3a;
            text-align: center;
            line-height: 1.7;
        }

        footer a {
            color: #555;
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        footer a:hover {
            color: var(--fg-dim);
        }
    </style>
</head>
